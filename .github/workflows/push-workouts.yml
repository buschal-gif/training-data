name: Push Workouts to Intervals.icu

on:
  workflow_run:
    workflows: ["Auto-Sync Intervals.icu Data"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes to Intervals.icu)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  push-workouts:
    runs-on: ubuntu-latest
    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Configure git identity
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Check if pending workouts exist
        id: check
        run: |
          if [ ! -f pending_workouts.json ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "ℹ️  No pending_workouts.json"
          else
            COUNT=$(python3 -c 'import json; d=json.load(open("pending_workouts.json")); print(len(d.get("workouts") or d.get("sessions") or []))' 2>/dev/null || echo 0)
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            if [ "$COUNT" = "0" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "ℹ️  Nothing to push"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "✅  Found $COUNT entries"
            fi
          fi

      - name: Setup Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install requests

      - name: Push workouts to Intervals.icu
        if: steps.check.outputs.skip == 'false'
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
            echo "🧪  DRY RUN mode"
          fi
          python push.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --pending pending_workouts.json \
            $FLAGS

      - name: Commit cleared pending file
        if: steps.check.outputs.skip == 'false'
        run: |
          git add pending_workouts.json
          git pull --rebase --autostash origin main
          if ! git diff --staged --quiet; then
            git commit -m "Clear pushed workouts — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅  Committed"
          else
            echo "⏭️  No changes to commit"
          fi
