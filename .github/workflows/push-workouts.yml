name: Push Workouts to Intervals.icu

on:
  # Runs after each sync — only proceeds if pending_workouts.json has entries
  workflow_run:
    workflows: ["Auto-Sync Intervals.icu Data"]
    types: [completed]

  # Manual trigger with optional dry-run
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (simulate, no writes to Intervals.icu)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  push-workouts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Check if pending workouts exist
        id: check
        run: |
          if [ ! -f pending_workouts.json ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "ℹ️  No pending_workouts.json — nothing to push"
          else
            COUNT=$(python3 -c "
          import json
          try:
              with open('pending_workouts.json') as f:
                  d = json.load(f)
              print(len(d.get('workouts', [])))
          except Exception:
              print(0)
          ")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            if [ "$COUNT" = "0" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "ℹ️  pending_workouts.json is empty — skipping"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "✅  Found $COUNT pending workout(s)"
            fi
          fi

      - name: Setup Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install requests

      - name: Verify push.py exists
        if: steps.check.outputs.skip == 'false'
        run: |
          if [ ! -f push.py ]; then
            echo "❌  push.py not found in repository root!"
            exit 1
          fi
          echo "✅  push.py found"

      - name: Push workouts to Intervals.icu
        if: steps.check.outputs.skip == 'false'
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
            echo "🧪  Running in DRY RUN mode"
          fi

          python push.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --pending pending_workouts.json \
            --pushed-log pushed_workouts.json \
            $FLAGS

      - name: Commit updated files
        if: steps.check.outputs.skip == 'false'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git add pending_workouts.json pushed_workouts.json 2>/dev/null || true
          git pull --rebase --autostash origin main

          if ! git diff --staged --quiet; then
            PUSHED_COUNT=$(python3 -c "
          import json
          try:
              with open('pushed_workouts.json') as f:
                  d = json.load(f)
              today = [e for e in d.get('pushed', []) if e.get('pushed_at','').startswith('$(date -u +%Y-%m-%d)')]
              print(len(today))
          except:
              print('?')
          ")
            git commit -m "Push ${PUSHED_COUNT} workout(s) to Intervals.icu — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅  Committed: pending cleared + audit log updated"
          else
            echo "⏭️  No file changes to commit"
          fi

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "### ⏭️ Skipped — no pending workouts" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Push complete" >> $GITHUB_STEP_SUMMARY
            if [ -f pushed_workouts.json ]; then
              TOTAL=$(python3 -c "
          import json
          with open('pushed_workouts.json') as f:
              d = json.load(f)
          print(len(d.get('pushed', [])))
          " 2>/dev/null || echo "?")
              echo "Total in audit log: **${TOTAL}** workouts" >> $GITHUB_STEP_SUMMARY
            fi
          fi
